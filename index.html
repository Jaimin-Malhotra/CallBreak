<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Callbreak Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .page { display: none; }
        .page.active { display: block; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="transition-colors duration-300 bg-slate-900 text-white min-h-screen font-sans">

    <div id="winnerModal" class="modal">
        <div class="bg-slate-800 w-full max-w-sm p-8 rounded-[2.5rem] text-center shadow-2xl border border-yellow-500/50">
            <h2 class="text-6xl mb-4">💰</h2>
            <h3 class="text-2xl font-black text-yellow-500 uppercase italic italic" id="wName">WINNER TAKES ALL</h3>
            <div id="finalScores" class="space-y-3 my-6 text-left bg-slate-900 p-6 rounded-3xl border border-slate-700"></div>
            <button onclick="location.reload()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl shadow-lg active:scale-95 transition">BACK TO PIT</button>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="bg-slate-800 w-full max-w-sm p-8 rounded-[2.5rem] shadow-2xl border border-slate-700">
            <h3 id="histLabel" class="text-xl font-bold mb-4 text-yellow-500 italic">Match Log</h3>
            <div id="histContent" class="space-y-3 mb-6"></div>
            <button onclick="document.getElementById('historyModal').classList.remove('active')" class="w-full bg-slate-700 py-4 rounded-2xl font-bold">CLOSE</button>
        </div>
    </div>

    <div class="max-w-md mx-auto p-4 pb-24">
        <header class="flex justify-between items-center py-4 mb-4">
            <h1 class="text-xl font-black italic text-yellow-500 uppercase tracking-tighter">CALLBREAK <span class="text-slate-400">PRO</span></h1>
            <div id="userAvatar" class="hidden flex items-center gap-3">
                <img id="userPic" onclick="logout()" class="w-10 h-10 rounded-full border-2 border-yellow-500 cursor-pointer shadow-lg">
            </div>
        </header>

        <div id="page-login" class="page active text-center space-y-12 pt-16">
            <div class="space-y-4">
                <h2 class="text-5xl font-black tracking-tighter leading-tight">ARE YOU READY <br>FOR <span class="text-yellow-500">GAMBLE?</span></h2>
                <p class="text-slate-500 font-bold uppercase text-xs tracking-widest">Fortune favors the bold</p>
            </div>
            <div class="space-y-4 px-6">
                <button onclick="login()" class="w-full bg-white text-black font-black py-5 rounded-2xl shadow-xl flex items-center justify-center gap-3 active:scale-95 transition">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    ENTER WITH GOOGLE
                </button>
                <button onclick="showPage('page-setup')" class="text-slate-500 underline text-sm font-black italic">CONTINUE AS GUEST</button>
            </div>
        </div>

        <div id="page-dashboard" class="page space-y-4">
            <button onclick="showPage('page-setup')" class="w-full bg-yellow-500 text-black p-8 rounded-[2rem] font-black text-left shadow-xl active:scale-95 transition">
                <span class="block text-4xl italic uppercase">NEW MATCH</span>
                <span class="opacity-60 text-xs">READY YOUR CARDS</span>
            </button>
            <div class="bg-slate-800 p-6 rounded-[2rem] space-y-4 min-h-[300px] border border-slate-700">
                <h3 class="font-black text-xs uppercase text-yellow-500 px-2 tracking-widest">Match Vault</h3>
                <div id="historyList" class="space-y-3">
                    <p class="text-[10px] italic opacity-40 px-2">No history in the vault yet.</p>
                </div>
            </div>
        </div>

        <div id="page-setup" class="page bg-slate-800 p-8 rounded-[2rem] shadow-2xl space-y-6 border border-slate-700 relative">
            <button onclick="goBack()" class="absolute top-6 right-8 text-yellow-500 font-bold text-xs underline">EXIT</button>
            <h2 class="text-2xl font-black italic uppercase text-yellow-500">The Players</h2>
            <div class="space-y-3">
                <input type="text" id="n0" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500" placeholder="P1 Name">
                <input type="text" id="n1" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500" placeholder="P2 Name">
                <input type="text" id="n2" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500" placeholder="P3 Name">
                <input type="text" id="n3" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500" placeholder="P4 Name">
            </div>
            <div>
                <label class="text-[10px] font-black uppercase opacity-40 ml-2 mb-1 block">Rounds</label>
                <select id="setupRounds" class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl font-bold">
                    <option value="4">4</option><option value="8">8</option><option value="12">12</option>
                </select>
            </div>
            <button onclick="startMatch()" class="w-full bg-yellow-500 text-black font-black py-5 rounded-2xl shadow-lg active:scale-95 transition text-lg">SHUFFLE & START</button>
        </div>

        <div id="page-game" class="page space-y-4">
            <div class="flex justify-between items-center text-[10px] font-black uppercase opacity-50 tracking-widest px-2">
                <span id="roundCounter">Round 1/4</span>
                <button onclick="if(confirm('Quit Match? Progress won\'t be saved.')) location.reload()" class="underline text-yellow-500">QUIT</button>
            </div>

            <div class="bg-slate-800 p-6 rounded-[2rem] shadow-2xl border border-slate-700">
                <h2 id="roundMode" class="text-center font-black text-yellow-500 mb-6 uppercase tracking-[0.3em] text-xs">BIDDING</h2>
                <div id="inputGroup" class="grid grid-cols-2 gap-4"></div>
                <p id="errorMsg" class="text-red-500 text-[10px] text-center mt-5 font-black hidden uppercase italic"></p>
                <button id="actionBtn" onclick="handleStep()" class="w-full mt-6 bg-yellow-500 text-black font-black py-5 rounded-2xl transition-all active:scale-95 text-lg shadow-xl shadow-yellow-500/20 uppercase">CONFIRM</button>
            </div>

            <div class="mt-4">
                <div class="overflow-x-auto rounded-2xl border border-slate-700 shadow-sm bg-slate-800">
                    <table class="w-full text-center text-[11px] table-fixed">
                        <thead class="bg-slate-900/50 text-slate-500">
                            <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="scoreBody"></tbody>
                        <tfoot class="font-black bg-yellow-500 text-black">
                            <tr id="tableFooter"></tr>
                        </tfoot>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnh9amE2yARJRZz1px0iLOr2F2zwa1bSU",
            authDomain: "callbreak-tracker-ffe3d.firebaseapp.com",
            projectId: "callbreak-tracker-ffe3d",
            storageBucket: "callbreak-tracker-ffe3d.appspot.com",
            messagingSenderId: "307020654807",
            appId: "1:307020654807:web:6460beb719c7f545efa892"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let players = ["P1", "P2", "P3", "P4"];
        let scores = []; let totalRounds = 4; let currentRound = 1; let gameState = 'BIDDING'; let tempBids = [0,0,0,0];

        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { if(confirm("Sign Out?")) auth.signOut().then(()=>location.reload()); }
        function goBack() { auth.currentUser ? showPage('page-dashboard') : showPage('page-login'); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userAvatar').classList.remove('hidden');
                document.getElementById('userPic').src = user.photoURL;
                showPage('page-dashboard');
                fetchHistory(user.uid);
            }
        });

        async function fetchHistory(uid) {
            const list = document.getElementById('historyList');
            const snap = await db.collection('match_logs').doc(uid).get();
            if(snap.exists) {
                const logs = snap.data().matches || [];
                if(logs.length > 0) {
                    list.innerHTML = logs.reverse().map(m => `
                        <div onclick='viewHistDetail(${JSON.stringify(m)})' class="bg-slate-900 border border-slate-700 p-4 rounded-2xl flex justify-between items-center text-[10px] font-black active:scale-95 transition cursor-pointer">
                            <div class="flex flex-col"><span class="text-yellow-500 uppercase">${m.label}</span><span class="opacity-40">${m.winner} WON</span></div>
                            <span class="bg-yellow-500 text-black px-2 py-1 rounded">VIEW</span>
                        </div>`).join('');
                }
            }
        }

        function viewHistDetail(match) {
            document.getElementById('histLabel').innerText = match.label;
            document.getElementById('histContent').innerHTML = match.players.map((p, i) => `
                <div class="flex justify-between items-center p-3 bg-slate-900 rounded-xl border border-slate-700">
                    <span class="font-bold uppercase text-xs opacity-70">${p}</span>
                    <span class="font-black text-yellow-500">${match.totals[i]}</span>
                </div>`).join('');
            document.getElementById('historyModal').classList.add('active');
        }

        function startMatch() {
            for(let i=0; i<4; i++) players[i] = document.getElementById('n'+i).value.trim() || `P${i+1}`;
            totalRounds = parseInt(document.getElementById('setupRounds').value);
            scores = []; currentRound = 1; gameState = 'BIDDING';
            renderUI(); showPage('page-game');
        }

        function handleStep() {
            const sIdx = (currentRound - 1) % 4;
            const vals = [];
            for(let i=0; i<4; i++) {
                const pIdx = (sIdx + i) % 4;
                vals[pIdx] = parseInt(document.getElementById('in'+pIdx).value) || 0;
            }
            const sum = vals.reduce((a,b)=>a+b, 0);
            const err = document.getElementById('errorMsg');

            if(gameState === 'BIDDING') {
                if(sum <= 8) { err.innerText = `⚠️ REDEAL: Sum ${sum} is too safe!`; err.classList.remove('hidden'); return; }
                tempBids = vals; gameState = 'SCORING'; err.classList.add('hidden');
            } else {
                if(sum !== 13) { err.innerText = `⚠️ CHEAT CHECK: Total must be 13! (You: ${sum})`; err.classList.remove('hidden'); return; }
                const pts = vals.map((v, i) => (v >= tempBids[i]) ? (tempBids[i] + (v - tempBids[i]) * 0.1) : (-tempBids[i]));
                scores.push({ pts });
                err.classList.add('hidden');
                if(currentRound >= totalRounds) { finalizeGame(); return; }
                currentRound++; gameState = 'BIDDING';
            }
            renderUI();
        }

        async function finalizeGame() {
            const totals = [0,0,0,0]; scores.forEach(r => r.pts.forEach((p, idx) => totals[idx] += p));
            const formattedTotals = totals.map(t => t.toFixed(1));
            let winIdx = totals.indexOf(Math.max(...totals));
            
            if(auth.currentUser) {
                const uid = auth.currentUser.uid;
                const today = new Date().toLocaleDateString('en-GB');
                const snap = await db.collection('match_logs').doc(uid).get();
                let matches = snap.exists ? snap.data().matches : [];
                let matchCountToday = matches.filter(m => m.date === today).length + 1;
                
                const matchData = { 
                    label: `${today}-M${matchCountToday}`,
                    date: today,
                    winner: players[winIdx],
                    players: players,
                    totals: formattedTotals,
                    timestamp: Date.now()
                };
                
                await db.collection('match_logs').doc(uid).set({ matches: firebase.firestore.FieldValue.arrayUnion(matchData) }, { merge: true });
            }

            document.getElementById('wName').innerText = `${players[winIdx]} CLEANS UP!`;
            document.getElementById('finalScores').innerHTML = players.map((p, i) => `
                <div class="flex justify-between font-black text-sm">
                    <span class="opacity-50 uppercase tracking-tighter">${p}</span><span class="text-yellow-500">${formattedTotals[i]}</span>
                </div>`).join('');
            document.getElementById('winnerModal').classList.add('active');
        }

        function renderUI() {
            const sIdx = (currentRound - 1) % 4;
            const group = document.getElementById('inputGroup');
            group.innerHTML = '';
            for(let i=0; i<4; i++) {
                const pIdx = (sIdx + i) % 4;
                const bidTxt = gameState === 'SCORING' ? `<span class="text-yellow-500 ml-1">(BID: ${tempBids[pIdx]})</span>` : '';
                group.innerHTML += `<div class="text-center">
                    <label class="text-[10px] font-black block truncate mb-1 ${i===0 ? 'text-yellow-500' : 'opacity-30'}">${players[pIdx]} ${i===0?'★':''}${bidTxt}</label>
                    <input type="number" id="in${pIdx}" class="w-full text-center text-2xl font-black bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:ring-2 ring-yellow-500 transition">
                </div>`;
            }
            document.getElementById('roundCounter').innerText = `Round ${currentRound}/${totalRounds}`;
            document.getElementById('roundMode').innerText = gameState;
            document.getElementById('actionBtn').innerText = gameState === 'BIDDING' ? "CONFIRM BIDS" : "SAVE ROUND";
            document.getElementById('actionBtn').className = `w-full mt-6 text-black font-black py-5 rounded-2xl transition-all ${gameState === 'BIDDING' ? 'bg-yellow-500' : 'bg-green-500'}`;
            renderTable();
        }

        function renderTable() {
            document.getElementById('tableHeader').innerHTML = `<th class="p-3 w-10">R</th>` + players.map(p => `<th class="p-3 truncate">${p}</th>`).join('');
            const body = document.getElementById('scoreBody');
            body.innerHTML = scores.map((r, i) => `<tr class="border-b border-slate-700"><td class="bg-slate-900 font-black italic">${i+1}</td>${r.pts.map(p => `<td class="font-bold ${p<0?'text-red-500':''}">${p.toFixed(1)}</td>`).join('')}</tr>`).join('');
            const totals = [0,0,0,0]; scores.forEach(r => r.pts.forEach((p, idx) => totals[idx] += p));
            document.getElementById('tableFooter').innerHTML = `<td class="p-3">TTL</td>` + totals.map(t => `<td class="p-3">${t.toFixed(1)}</td>`).join('');
            [0,1,2,3].forEach(n => { if(document.getElementById('in'+n)) document.getElementById('in'+n).value = ""; });
        }
    </script>
</body>
</html>
