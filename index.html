<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Callbreak Tablet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .page { display: none; }
        .page.active { display: block; }
        .table-fixed { table-layout: fixed; }
        th, td { border: 1px solid rgba(156, 163, 175, 0.2); }
    </style>
</head>
<body class="transition-colors duration-300 bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-white min-h-screen font-sans">

    <div class="max-w-md mx-auto p-4 pb-24">
        <header class="flex justify-between items-center py-4 mb-4">
            <h1 class="text-xl font-black italic text-yellow-500">CALLBREAK <span class="text-slate-400">TABLET</span></h1>
            <div class="flex items-center gap-3">
                <button onclick="toggleTheme()" class="p-2 rounded-full bg-slate-200 dark:bg-slate-800">🌓</button>
                <div id="userAvatar" class="hidden"><img id="userPic" onclick="logout()" class="w-8 h-8 rounded-full border-2 border-yellow-500"></div>
            </div>
        </header>

        <div id="page-login" class="page active text-center space-y-8 pt-20">
            <h2 class="text-4xl font-black">Callbreak</h2>
            <button onclick="login()" class="bg-white text-black font-bold py-4 px-8 rounded-2xl shadow-xl flex items-center mx-auto gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="w-5"> Login with Google
            </button>
        </div>

        <div id="page-dashboard" class="page space-y-4">
            <button onclick="showPage('page-setup')" class="w-full bg-yellow-500 text-black p-6 rounded-3xl font-black text-left shadow-lg">
                <span class="block text-2xl">NEW MATCH</span>
            </button>
            <button onclick="loadHistory()" class="w-full bg-slate-200 dark:bg-slate-800 p-6 rounded-3xl font-bold text-left">
                <span class="block text-xl">RESUME/HISTORY</span>
                <p id="histDetail" class="text-xs opacity-50">No recent games found</p>
            </button>
        </div>

        <div id="page-setup" class="page bg-white dark:bg-slate-800 p-6 rounded-3xl space-y-4">
            <h2 class="text-xl font-bold">Player Names</h2>
            <div class="space-y-2">
                <input type="text" id="n0" class="w-full bg-slate-100 dark:bg-slate-700 p-3 rounded-xl" placeholder="Player 1">
                <input type="text" id="n1" class="w-full bg-slate-100 dark:bg-slate-700 p-3 rounded-xl" placeholder="Player 2">
                <input type="text" id="n2" class="w-full bg-slate-100 dark:bg-slate-700 p-3 rounded-xl" placeholder="Player 3">
                <input type="text" id="n3" class="w-full bg-slate-100 dark:bg-slate-700 p-3 rounded-xl" placeholder="Player 4">
            </div>
            <select id="setupRounds" class="w-full bg-slate-100 dark:bg-slate-700 p-3 rounded-xl">
                <option value="4">4 Rounds</option><option value="8">8 Rounds</option><option value="12">12 Rounds</option>
            </select>
            <button onclick="startMatch()" class="w-full bg-yellow-500 text-black font-black py-4 rounded-2xl">START</button>
        </div>

        <div id="page-game" class="page space-y-4">
            <div class="flex justify-between items-center text-xs font-bold uppercase opacity-60">
                <span id="roundCounter">Round 1/4</span>
                <select id="gameLimit" onchange="updateLimit(this.value)" class="bg-transparent border-b border-white outline-none">
                    <option value="4">4</option><option value="8">8</option><option value="12">12</option>
                </select>
            </div>

            <div class="bg-white dark:bg-slate-800 p-5 rounded-3xl shadow-xl">
                <h2 id="roundMode" class="text-center font-black text-yellow-500 mb-4 uppercase tracking-widest">BIDDING</h2>
                <div id="inputGroup" class="grid grid-cols-2 gap-4">
                    </div>
                <p id="errorMsg" class="text-red-500 text-[10px] text-center mt-3 hidden"></p>
                <button id="actionBtn" onclick="handleStep()" class="w-full mt-5 bg-yellow-500 text-black font-black py-4 rounded-2xl">CONFIRM</button>
            </div>

            <div class="overflow-x-auto mt-4 rounded-xl border border-slate-700">
                <table class="w-full text-center text-[10px] table-fixed bg-white dark:bg-slate-800">
                    <thead class="bg-slate-100 dark:bg-slate-700">
                        <tr id="tableHeader"></tr>
                    </thead>
                    <tbody id="scoreBody"></tbody>
                    <tfoot class="font-bold bg-yellow-500 text-black">
                        <tr id="tableFooter"></tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnh9amE2yARJRZz1px0iLOr2F2zwa1bSU",
            authDomain: "callbreak-tracker-ffe3d.firebaseapp.com",
            projectId: "callbreak-tracker-ffe3d",
            storageBucket: "callbreak-tracker-ffe3d.appspot.com",
            messagingSenderId: "307020654807",
            appId: "1:307020654807:web:6460beb719c7f545efa892"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let players = ["P1", "P2", "P3", "P4"];
        let scores = []; // Array of round objects { bids: [], made: [], roundPoints: [] }
        let totalRounds = 4;
        let currentRound = 1;
        let gameState = 'BIDDING'; 
        let tempBids = [0,0,0,0];

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function login() { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function logout() { if(confirm("Logout?")) auth.signOut().then(()=>location.reload()); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userAvatar').classList.remove('hidden');
                document.getElementById('userPic').src = user.photoURL;
                showPage('page-dashboard');
                checkRecentHistory(user.uid);
            }
        });

        async function checkRecentHistory(uid) {
            const doc = await db.collection('games').doc(uid).get();
            if(doc.exists) document.getElementById('histDetail').innerText = "Last game: Round " + doc.data().currentRound;
        }

        function startMatch() {
            for(let i=0; i<4; i++) {
                const n = document.getElementById('n'+i).value.trim();
                if(n) players[i] = n;
            }
            totalRounds = parseInt(document.getElementById('setupRounds').value);
            scores = [];
            currentRound = 1;
            gameState = 'BIDDING';
            renderUI();
            showPage('page-game');
        }

        function handleStep() {
            const starterIdx = (currentRound - 1) % 4;
            const vals = [];
            // Collect rotated inputs back to 0-3 index
            for(let i=0; i<4; i++) {
                const rotatedIdx = (starterIdx + i) % 4;
                vals[rotatedIdx] = parseInt(document.getElementById('in'+rotatedIdx).value) || 0;
            }

            const sum = vals.reduce((a,b)=>a+b, 0);
            const err = document.getElementById('errorMsg');

            if(gameState === 'BIDDING') {
                if(sum <= 8) { err.innerText = `CANCELLED: Sum ${sum} <= 8`; err.classList.remove('hidden'); return; }
                tempBids = vals;
                gameState = 'SCORING';
                err.classList.add('hidden');
            } else {
                if(sum !== 13) { err.innerText = `ERROR: Sum must be 13 (Got ${sum})`; err.classList.remove('hidden'); return; }
                
                const roundPoints = [];
                for(let i=0; i<4; i++) {
                    roundPoints[i] = (vals[i] >= tempBids[i]) ? (tempBids[i] + (vals[i] - tempBids[i]) * 0.1) : (-tempBids[i]);
                }
                
                scores.push({ bids: [...tempBids], made: vals, pts: roundPoints });
                saveMatch();
                
                if(currentRound >= totalRounds) { alert("Match Over!"); showPage('page-dashboard'); return; }
                currentRound++;
                gameState = 'BIDDING';
            }
            renderUI();
        }

        function renderUI() {
            const starterIdx = (currentRound - 1) % 4;
            const group = document.getElementById('inputGroup');
            group.innerHTML = '';
            
            // Generate rotated inputs: Starter is ALWAYS first
            for(let i=0; i<4; i++) {
                const pIdx = (starterIdx + i) % 4;
                group.innerHTML += `
                    <div class="text-center">
                        <label class="text-[10px] font-bold block truncate ${i===0 ? 'text-yellow-500' : 'opacity-50'}">${players[pIdx]}</label>
                        <input type="number" id="in${pIdx}" class="w-full text-center text-xl font-bold bg-slate-100 dark:bg-slate-700 p-3 rounded-xl outline-none ring-yellow-500 focus:ring-2">
                    </div>`;
            }

            document.getElementById('roundCounter').innerText = `Round ${currentRound}/${totalRounds}`;
            document.getElementById('roundMode').innerText = gameState;
            document.getElementById('actionBtn').innerText = gameState === 'BIDDING' ? "CONFIRM BIDS" : "SAVE RESULTS";
            document.getElementById('actionBtn').className = `w-full mt-5 text-black font-black py-4 rounded-2xl ${gameState === 'BIDDING' ? 'bg-yellow-500' : 'bg-green-500'}`;

            renderTable();
        }

        function renderTable() {
            document.getElementById('tableHeader').innerHTML = `<th class="p-2">R</th>` + players.map(p => `<th class="p-2 truncate">${p}</th>`).join('');
            
            const body = document.getElementById('scoreBody');
            body.innerHTML = scores.map((r, i) => `
                <tr class="border-b border-slate-700/50">
                    <td class="bg-slate-100 dark:bg-slate-800 font-bold">${i+1}</td>
                    ${r.pts.map(p => `<td class="${p<0?'text-red-500':''}">${p.toFixed(1)}</td>`).join('')}
                </tr>
            `).join('');

            const totals = [0,0,0,0];
            scores.forEach(r => r.pts.forEach((p, idx) => totals[idx] += p));
            document.getElementById('tableFooter').innerHTML = `<td>TTL</td>` + totals.map(t => `<td>${t.toFixed(1)}</td>`).join('');
        }

        async function saveMatch() {
            const user = auth.currentUser;
            if(user) {
                await db.collection('games').doc(user.uid).set({ players, scores, currentRound, totalRounds, timestamp: Date.now() });
            }
        }

        async function loadHistory() {
            const user = auth.currentUser;
            if(!user) return;
            const doc = await db.collection('games').doc(user.uid).get();
            if(doc.exists) {
                const d = doc.data();
                players = d.players; scores = d.scores; currentRound = d.currentRound; totalRounds = d.totalRounds;
                gameState = 'BIDDING';
                renderUI();
                showPage('page-game');
            } else { alert("No game found."); }
        }

        function updateLimit(v) { 
            if(parseInt(v) < currentRound) { alert("Too low!"); return; }
            totalRounds = parseInt(v); 
            renderUI(); 
        }
    </script>
</body>
</html>
